<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Naddi's{% endblock %}</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div class="header-social"><!-- leer, nur für grid-spacing --></div>
    <div class="header-logo">
      <a href="/index.html">
        <img src="/images/portfolio/favo.png" alt="Naddi's Ceramiche">
      </a>
    </div>
    <div class="header-right">
      <button class="burger" aria-label="Menü öffnen">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <nav class="header-nav">
    {% for link in nav.links %}
    <a href="{{ link.url }}" {% if current_url == link.url %}class="active"{% endif %}>{{ link.titel }}</a>
    {% endfor %}
  </nav>
</header>

<nav class="mobile-nav">
  <button class="mobile-nav-close" aria-label="Menü schließen">&times;</button>
  {% for link in nav.links %}
  <a href="{{ link.url }}">{{ link.titel }}</a>
  {% endfor %}
</nav>

<main>
{% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <a class="footer-instagram" href="https://www.instagram.com/naddis_keramik/" target="_blank" rel="noopener" aria-label="Instagram">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4.5"/>
      <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
    </svg>
    naddis_keramik
  </a>
  <span>Naddis Ceramiche &nbsp;·&nbsp; PARTITA IVA 03307290217</span>
</footer>

<script src="/scripts.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
