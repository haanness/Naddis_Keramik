<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Naddi's{% endblock %}</title>
  <link rel="alternate" hreflang="de" href="/de/{{ current_file }}">
  <link rel="alternate" hreflang="it" href="/it/{{ current_file }}">
  <link rel="alternate" hreflang="en" href="/en/{{ current_file }}">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div class="header-logo">
      <a href="/{{ lang }}/index.html">
        <img src="/images/portfolio/favo.png" alt="Naddi's Ceramiche">
      </a>
    </div>
    <div class="header-right">
      <button class="burger" aria-label="Menü öffnen">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <nav class="header-nav">
    <div class="header-nav-links">
      {% for link in nav.links %}
      <a href="/{{ lang }}/{{ link.url }}"
         {% if current_url == link.url %}class="active"{% endif %}>
        {{ link['titel_' + lang] }}
      </a>
      {% endfor %}
    </div>
    <div class="header-nav-lang">
      <a href="/de/{{ current_file }}"
         class="lang-switch{% if lang == 'de' %} active{% endif %}">DE</a>
      <a href="/it/{{ current_file }}"
         class="lang-switch{% if lang == 'it' %} active{% endif %}">IT</a>
      <a href="/en/{{ current_file }}"
         class="lang-switch{% if lang == 'en' %} active{% endif %}">EN</a>
    </div>
  </nav>
</header>

<nav class="mobile-nav">
  <button class="mobile-nav-close" aria-label="Menü schließen">&times;</button>
  {% for link in nav.links %}
  <a href="/{{ lang }}/{{ link.url }}">{{ link['titel_' + lang] }}</a>
  {% endfor %}
  <div class="mobile-lang">
    <a href="/de/{{ current_file }}"
       class="lang-switch{% if lang == 'de' %} active{% endif %}">DE</a>
    <a href="/it/{{ current_file }}"
       class="lang-switch{% if lang == 'it' %} active{% endif %}">IT</a>
    <a href="/en/{{ current_file }}"
       class="lang-switch{% if lang == 'en' %} active{% endif %}">EN</a>
  </div>
</nav>

<main>
{% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <a class="footer-instagram" href="https://www.instagram.com/naddis_keramik/" target="_blank" rel="noopener" aria-label="Instagram">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4.5"/>
      <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
    </svg>
    naddis_keramik
  </a>
  <span>Naddis Ceramiche &nbsp;·&nbsp; PARTITA IVA 03307290217</span>
</footer>

<script src="/scripts.js"></script>
</body>
</html>
