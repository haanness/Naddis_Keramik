backend:
  name: github
  repo: haanness/Naddis_Keramik
  branch: main

media_folder: "images/portfolio"
public_folder: "/images/portfolio"

locale: de

collections:

  # ── Kategorien (Portfolio) ──────────────────────────────
  - name: kategorien
    label: Kategorien
    label_singular: Kategorie
    folder: _kategorien
    create: true
    identifier_field: name
    extension: yaml
    format: yaml
    fields:
      - { name: name,  label: Name, widget: string }
      - { name: slug,  label: "URL-Name (keine Leerzeichen)", widget: string, hint: "z.B. vasen, neue-serie" }
      - name: titelbild
        label: Titelbild (Startseite)
        widget: object
        fields:
          - { name: bild, label: Bild,             widget: image  }
          - { name: alt,  label: Bildbeschreibung, widget: string }
      - name: bilder
        label: Bilder
        label_singular: Bild
        widget: list
        fields:
          - { name: bild,   label: Bild,              widget: image  }
          - { name: titel,  label: Bildbeschreibung,  widget: string, required: false }

  # ── Navigation ──────────────────────────────────────────
  - name: navigation
    label: Navigation
    files:
      - name: nav
        label: Navigationsleiste
        file: _data/nav.yaml
        fields:
          - name: links
            label: Links
            label_singular: Link
            widget: list
            hint: "Reihenfolge per Drag & Drop ändern."
            fields:
              - { name: titel, label: Titel, widget: string }
              - { name: url,   label: URL,   widget: string, hint: "z.B. /kontakt.html" }

  # ── Fixe Seiten ─────────────────────────────────────────
  - name: fixe-seiten
    label: "Fixe Seiten"
    files:

      - name: about
        label: About me
        file: _data/about.yaml
        fields:
          - { name: foto, label: Profilfoto, widget: image }
          - name: text_it
            label: "Text (Italiano)"
            widget: list
            label_singular: Absatz
            fields:
              - { name: absatz, label: Absatz, widget: text }
          - name: text_en
            label: "Text (English)"
            widget: list
            label_singular: Absatz
            fields:
              - { name: absatz, label: Absatz, widget: text }
          - { name: email,     label: E-Mail,                     widget: string }
          - { name: telefon,   label: Telefon,                    widget: string }
          - { name: instagram, label: "Instagram Handle (ohne @)", widget: string }

      - name: course
        label: Course
        file: _data/course.yaml
        fields:
          - { name: titel, label: Seitentitel, widget: string }
          - name: text
            label: Texte
            label_singular: Absatz
            widget: list
            fields:
              - { name: absatz, label: Absatz, widget: text }
