backend:
  name: git-gateway
  branch: main

media_folder: "images/portfolio"
public_folder: "/images/portfolio"

locale: de

collections:
  - name: "kategorien"
    label: "Kategorien"
    label_singular: "Kategorie"
    folder: "_kategorien"
    create: true
    identifier_field: "name"
    extension: "yaml"
    format: "yaml"
    fields:
      - { name: name, label: "Name", widget: string }
      - { name: slug, label: "URL-Name (keine Leerzeichen, keine Sonderzeichen)", widget: string, hint: "z.B. vasen, lampen, figure-forme" }
      - name: titelbild
        label: "Titelbild (wird auf der Startseite angezeigt)"
        widget: object
        fields:
          - { name: bild, label: "Bild", widget: image }
          - { name: alt, label: "Bildbeschreibung", widget: string }
      - name: bilder
        label: "Bilder in dieser Kategorie"
        label_singular: "Bild"
        widget: list
        fields:
          - { name: bild, label: "Bild", widget: image }
          - { name: alt, label: "Bildbeschreibung", widget: string, required: false }

  - name: "seiten"
    label: "Seiten"
    files:
      - name: "about"
        label: "About me"
        file: "_data/about.yaml"
        fields:
          - { name: foto, label: "Profilfoto", widget: image }
          - name: text_it
            label: "Text (Italiano)"
            widget: list
            label_singular: "Absatz"
            fields:
              - { name: absatz, label: "Absatz", widget: text }
          - name: text_en
            label: "Text (English)"
            widget: list
            label_singular: "Absatz"
            fields:
              - { name: absatz, label: "Absatz", widget: text }
          - { name: email, label: "E-Mail", widget: string }
          - { name: telefon, label: "Telefon", widget: string }
          - { name: instagram, label: "Instagram Handle (ohne @)", widget: string }
