text_de:
  - absatz: Mein Name ist Nadia Mussner, ich bin im Jahr 2000 geboren und lebe in Gröden.
  - absatz: Nach meiner Matura an der Kunstschule besuchte ich die Ortweinschule in Graz, wo ich die Meisterklasse für Kunst und Design mit Schwerpunkt Keramikmodellierung absolvierte. Seitdem bin ich in mein Heimatdorf Wolkenstein in Gröden zurückgekehrt, wo ich nun an meinen Werken arbeite.
  - absatz: Die Natur und alltägliche Erfahrungen sind die wichtigsten Inspirationsquellen für meine Arbeit. Mit meinen Arbeiten strebe ich ein Gleichgewicht zwischen Funktionalität, Materialität und künstlerischem Ausdruck an.
  - absatz: Mein Schaffen konzentriert sich in erster Linie auf einzigartige Keramikobjekte, daneben kommen ausgewählte Kooperationen und Auftragsarbeiten hinzu.
text_it:
  - absatz: Mi chiamo Nadia Mussner, sono nata nell'anno 2000 e vivo in Val Gardena.
  - absatz: Dopo essermi maturata al liceo artistico, ho imparato il mio mestiere all'Ortweinschule di Graz, frequentando il corso di perfezionamento in arte e design nella modellazione della ceramica. Da allora sono tornata nel mio paese natale, Selva di Val Gardena, dove ora lavoro sulle mie opere.
  - absatz: I miei lavori sono fortemente ispirati alla natura e agli eventi della vita quotidiana. Nel mio lavoro cerco equilibrio tra funzionalità, materia ed espressione artistica.
  - absatz: Mi concentro principalmente su pezzi unici, affiancati da collaborazioni e creazioni realizzate su richiesta.
